<!DOCTYPE html>
<html>
<head>
    <title>HSK Test Score Report</title>
    <style>
        body {
            background: #f0f0f0;
            font-family: Times New Roman;
        }
        .page {
            width: 800px;
            background: white;
            margin: auto;
            padding: 20px;
            border: 2px solid black;
        }
        .title {
            text-align: center;
            border-bottom: 1px solid black;
            padding-bottom: 10px;
        }
        .info {
            display: flex;
            border-bottom: 1px solid black;
        }
        .info-left {
            width: 70%;
            padding: 10px;
            border-right: 1px solid black;
        }
        .info-right {
            width: 30%;
            padding: 10px;
            text-align: center;
        }
        .photo {
            width: 120px;
            height: 150px;
            border: 1px solid black;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 12px;
            text-align: center;
        }
        .bottom {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
        }
        .stamp {
            width: 150px;
        }
        .qr {
            width: 120px;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="title">
        <h2>HSK (Level 4) Test Score Report</h2>
        <p>汉语水平考试成绩报告</p>
    </div>

    <div class="info">
        <div class="info-left">
            <p><b>Name:</b> TANAWAR MOHIT</p>
            <p><b>Test Level:</b> HSK Level 4</p>
            <p><b>Test Date:</b> 22 March 2026</p>
            <p><b>Registration No:</b> H42506056873</p>
        </div>
        <div class="info-right">
            <img src="photo.jpg" class="photo">
        </div>
    </div>

    <table>
        <tr>
            <th>Listening</th>
            <th>Reading</th>
            <th>Writing</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>81</td>
            <td>63</td>
            <td>60</td>
            <td>204</td>
        </tr>
    </table>

    <div class="bottom">
        <img src="stamp.png" class="stamp">
        <img src="qr.png" class="qr">
    </div>

</div>

</body>
</html>
