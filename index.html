<!DOCTYPE html>
<html>
<head>
    <title>HSK Report</title>
    <style>
        body {
            background: #e6e6e6;
            font-family: Times New Roman;
        }

        .page {
            width: 850px;
            background: white;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid black;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        .top-section {
            display: flex;
            border-bottom: 1px solid black;
        }

        .left-info {
            width: 75%;
            padding: 10px;
            border-right: 1px solid black;
        }

        .right-photo {
            width: 25%;
            text-align: center;
            padding: 10px;
        }

        .photo {
            width: 130px;
            height: 160px;
            border: 1px solid black;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .bottom-section {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            border-top: 1px solid black;
            padding-top: 20px;
        }

        .stamp {
            width: 160px;
        }

        .qr {
            width: 120px;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="header">
        <h2>Chinese Proficiency Test</h2>
        <h3>HSK (Level 4) Test Score Report</h3>
    </div>

    <div class="top-section">
        <div class="left-info">
            <p><b>Name:</b> TANAWAR MOHIT</p>
            <p><b>Nationality:</b> India</p>
            <p><b>Test Date:</b> 22 March 2026</p>
            <p><b>Registration No:</b> H42506056873</p>
        </div>

        <div class="right-photo">
            <img src="photo.jpg" class="photo">
        </div>
    </div>

    <table>
        <tr>
            <th>Listening</th>
            <th>Reading</th>
            <th>Writing</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>81</td>
            <td>63</td>
            <td>60</td>
            <td>204</td>
        </tr>
    </table>

    <div class="bottom-section">
        <img src="stamp.png" class="stamp">
        <img src="qr.png" class="qr">
    </div>

</div>

</body>
</html>
